<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pou Online Multiplayer</title>
    <style>
        /* DESIGN DO APP - MOBILE FIRST */
        :root {
            --bg-kitchen: #f39c12;
            --bg-bedroom: #2c3e50;
            --bg-social: #9b59b6;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Arial Black', sans-serif; overflow: hidden;
            background-color: #ededed;
        }
        .screen { display: none; width: 100%; height: 100%; position: relative; }
        .screen.active { display: flex; flex-direction: column; }

        /* TELA DE LOGIN ESTILO SPLASH */
        #auth-screen { background: #55efc4; align-items: center; justify-content: center; }
        .auth-box {
            background: white; padding: 30px; border-radius: 25px;
            box-shadow: 0 12px 0px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 340px;
        }
        .auth-box h1 { color: #2d3436; margin-bottom: 5px; font-size: 28px; }
        .auth-box input {
            padding: 15px; width: 85%; margin: 20px 0; border: 3px solid #b2bec3;
            border-radius: 15px; font-size: 16px; text-align: center; font-family: inherit;
        }
        .btn-green {
            background: #2ecc71; color: white; padding: 15px 30px; border: none;
            border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 6px 0 #27ae60; width: 95%;
        }
        .btn-green:active { transform: translateY(4px); box-shadow: 0 2px 0 #27ae60; }

        /* HUD - BARRAS DE STATUS */
        #hud {
            background: #fff; padding: 15px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 4px solid #dfe6e9; z-index: 10;
        }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 55%; }
        .stat-bar { display: flex; align-items: center; gap: 5px; background: #eee; padding: 4px; border-radius: 10px; }
        .progress { width: 100%; height: 14px; background: #b2bec3; border-radius: 8px; overflow: hidden; }
        .fill { height: 100%; width: 100%; background: #2ecc71; transition: width 0.3s; }
        .user-info { display: flex; flex-direction: column; align-items: flex-end; font-size: 14px; color: #2d3436; }

        /* CÔMODOS DO JOGO */
        #room-container { flex: 1; position: relative; display: flex; align-items: center; justify-content: space-between; }
        #room-content { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; transition: background 0.3s; }
        .kitchen { background-color: var(--bg-kitchen); }
        .bedroom { background-color: var(--bg-bedroom); }
        .nav-btn { background: rgba(0,0,0,0.2); border: none; color: white; padding: 20px 15px; cursor: pointer; font-size: 24px; border-radius: 10px; margin: 10px; z-index: 5;}

        /* O POU REALISTA (CSS ART) */
        #pou-character {
            width: 170px; height: 150px; background: #b5835a;
            border-radius: 50% 50% 43% 43% / 63% 63% 37% 37%;
            position: relative; box-shadow: inset 0 -12px 0 rgba(0,0,0,0.15), 0 15px 20px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.1s, background 0.3s;
        }
        .eyes { display: flex; gap: 24px; margin-top: -20px; }
        .eye { width: 42px; height: 42px; background: white; border-radius: 50%; border: 3px solid #333; position: relative; display: flex; align-items: center; justify-content: center; }
        .pupil { width: 16px; height: 16px; background: #000; border-radius: 50%; }
        .mouth { width: 35px; height: 15px; border: 4px solid #333; border-top: none; border-radius: 0 0 20px 20px; margin-top: 15px; transition: all 0.2s; }
        
        /* Expressões Animadas */
        #pou-character.eating .mouth { width: 25px; height: 25px; background: #333; border-radius: 50%; }
        #pou-character.sleeping .eye { height: 4px; background: #333; border-radius: 0; border: none; }
        #pou-character.sleeping .mouth { width: 20px; height: 4px; border: none; background: #333; border-radius: 2px; }

        /* ELEMENTOS INTERATIVOS DOS CÔMODOS */
        #room-actions { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 15px; }
        .action-btn { background: white; border: 3px solid #333; border-radius: 50%; width: 65px; height: 65px; font-size: 28px; cursor: pointer; box-shadow: 0 5px 0 #333; display: flex; align-items: center; justify-content: center; }
        .action-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #333; }

        /* ABA INFERIOR E BOTÕES */
        #game-menu { background: white; padding: 12px; display: flex; justify-content: space-around; border-top: 4px solid #dfe6e9; }
        .menu-btn { padding: 12px 20px; border-radius: 12px; border: none; font-family: inherit; font-weight: bold; cursor: pointer; font-size: 14px; }
        #btn-open-social { background: var(--bg-social); color: white; }
        #btn-save-account { background: #3498db; color: white; display: none; }

        /* MODAL MULTIPLAYER */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; }
        .modal-content { background: white; margin: 12% auto; padding: 25px; width: 85%; max-width: 400px; border-radius: 20px; border: 4px solid #333; position: relative; }
        .close-btn { position: absolute; right: 15px; top: 10px; font-size: 30px; cursor: pointer; }
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 2px solid #eee; }
    </style>
</head>
<body>

    <!-- 1. TELA DE LOGIN ANÔNIMO -->
    <div id="auth-screen" class="screen active">
        <div class="auth-box">
            <h1>Pou Online 🥔</h1>
            <input type="text" id="pou-nickname-input" placeholder="Nome do seu Pou" maxlength="12">
            <button id="btn-play-guest" class="btn-green">JOGAR</button>
        </div>
    </div>

    <!-- 2. TELA DO JOGO PRINCIPAL -->
    <div id="game-screen" class="screen">
        <header id="hud">
            <div class="stats-grid">
                <div class="stat-bar">🍖<div class="progress"><div id="bar-hunger" class="fill"></div></div></div>
                <div class="stat-bar">❤️<div class="progress"><div id="bar-health" class="fill"></div></div></div>
                <div class="stat-bar">🕹️<div class="progress"><div id="bar-fun" class="fill"></div></div></div>
                <div class="stat-bar">⚡<div class="progress"><div id="bar-energy" class="fill"></div></div></div>
            </div>
            <div class="user-info">
                <span id="pou-name">Pou</span>
                <span id="pou-level">Nível 1</span>
                <span id="pou-coins">🪙 150</span>
            </div>
        </header>

        <main id="room-container">
            <button id="nav-left" class="nav-btn">◀</button>
            
            <div id="room-content" class="kitchen">
                <!-- O POU -->
                <div id="pou-character">
                    <div class="eyes">
                        <div class="eye"><div class="pupil"></div></div>
                        <div class="eye"><div class="pupil"></div></div>
                    </div>
                    <div class="mouth"></div>
                </div>

                <!-- AÇÕES DO CÔMODO (MUDAM VIA JS) -->
                <div id="room-actions">
                    <button id="action-trigger" class="action-btn">🍔</button>
                </div>
            </div>

            <button id="nav-right" class="nav-btn">▶</button>
        </main>

        <footer id="game-menu">
            <button id="btn-open-social" class="menu-btn">🌐 AMIGOS ONLINE</button>
            <button id="btn-save-account" class="menu-btn">💾 SALVAR NO GOOGLE</button>
        </footer>
    </div>

    <!-- 3. MODAL SOCIAL MULTIPLAYER -->
    <div id="social-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <h2 style="margin-top: 0;">Pous do Servidor 🌍</h2>
            <div id="social-body" style="max-height: 300px; overflow-y: auto;">
                <!-- Preenchido via Firebase -->
            </div>
        </div>
    </div>

    <!-- INTEGRAÇÃO COMPLETA DO FIREBASE EM UM SÓ LUGAR -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously, GoogleAuthProvider, linkWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Configuração do seu Projeto LippezinGame
        const firebaseConfig = {
            apiKey: "AIzaSyDKtqyAvo8nNebINI6iIbFwyYyXomp-55M",
            authDomain: "lippezingame.firebaseapp.com",
            projectId: "lippezingame",
            storageBucket: "lippezingame.firebasestorage.app",
            messagingSenderId: "690275116956",
            appId: "1:690275116956:web:c26a22dac3c07f56130a59",
            measurementId: "G-FMT175RLFZ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ESTADO GLOBAL DO JOGO LOCAL
        let pou = null;
        let userDocRef = null;
        let currentRoom = "kitchen"; // inicial
        const rooms = ["kitchen", "bedroom"];

        // ELEMENTOS DA UI
        const pouChar = document.getElementById('pou-character');
        const actionTrigger = document.getElementById('action-trigger');
        const roomContent = document.getElementById('room-content');

        // 1. SISTEMA DE LOGIN ANÔNIMO + SALVAR CONTA
        document.getElementById('btn-play-guest').addEventListener('click', async () => {
            const nameInput = document.getElementById('pou-nickname-input').value.trim();
            sessionStorage.setItem('pou_name', nameInput || "Pou");
            await signInAnonymously(auth);
        });

        document.getElementById('btn-save-account').addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                await linkWithPopup(auth.currentUser, provider);
                alert("Progresso salvo com sucesso na sua conta Google!");
                document.getElementById('btn-save-account').style.display = 'none';
            } catch (e) { alert("Erro ao salvar conta: " + e.message); }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.remove('active');
                document.getElementById('game-screen').classList.add('active');
                document.getElementById('btn-save-account').style.display = user.isAnonymous ? 'block' : 'none';

                userDocRef = doc(db, "pous", user.uid);
                const docSnap = await getDoc(userDocRef);

                if (docSnap.exists()) {
                    pou = docSnap.data();
                } else {
                    // Novo Pou criado se não existir dados na nuvem
                    pou = {
                        name: sessionStorage.getItem('pou_name') || "Pou",
                        level: 1, xp: 0, coins: 150,
                        hunger: 100, health: 100, fun: 100, energy: 100,
                        isSleeping: false
                    };
                    await setDoc(userDocRef, pou);
                }
                updateUI();
                startGameLoop();
            }
        });

        // 2. GAME LOOP (DECAIMENTO DOS STATUS EM TEMPO REAL)
        function startGameLoop() {
            setInterval(() => {
                if (!pou) return;
                
                // Diminui os status aos poucos
                if (pou.isSleeping) {
                    pou.energy = Math.min(100, pou.energy + 5);
                } else {
                    pou.hunger = Math.max(0, pou.hunger - 1);
                    pou.energy = Math.max(0, pou.energy - 0.5);
                    pou.fun = Math.max(0, pou.fun - 1);
                }

                if (pou.hunger < 20) pou.health = Math.max(0, pou.health - 2);

                updateUI();
                saveData();
            }, 8000); // Roda a cada 8 segundos para fins de teste rápido
        }

        function updateUI() {
            if (!pou) return;
            document.getElementById('bar-hunger').style.width = `${pou.hunger}%`;
            document.getElementById('bar-health').style.width = `${pou.health}%`;
            document.getElementById('bar-fun').style.width = `${pou.fun}%`;
            document.getElementById('bar-energy').style.width = `${pou.energy}%`;
            document.getElementById('pou-name').innerText = pou.name;
            document.getElementById('pou-level').innerText = `Nível ${pou.level}`;
            document.getElementById('pou-coins').innerText = `🪙 ${pou.coins}`;

            // Troca de animações visuais do Pou
            pouChar.className = "";
            if (pou.isSleeping) {
                pouChar.classList.add('sleeping');
            }
        }

        async function saveData() {
            if (userDocRef && pou) {
                await updateDoc(userDocRef, pou);
            }
        }

        // 3. LOGICA DOS CÔMODOS E INTERAÇÃO REAL
        document.getElementById('nav-right').addEventListener('click', () => switchRoom(1));
        document.getElementById('nav-left').addEventListener('click', () => switchRoom(-1));

        function switchRoom(dir) {
            let idx = rooms.indexOf(currentRoom) + dir;
            if (idx < 0) idx = rooms.length - 1;
            if (idx >= rooms.length) idx = 0;
            currentRoom = rooms[idx];
            
            roomContent.className = currentRoom;

            // Altera o botão de ação dependendo do cômodo
            if (currentRoom === "kitchen") {
                actionTrigger.innerText = "🍔";
            } else if (currentRoom === "bedroom") {
                actionTrigger.innerText = pou.isSleeping ? "💡" : "🌙";
            }
        }

        // Cliques no botão de ação de cada cômodo
        actionTrigger.addEventListener('click', () => {
            if (currentRoom === "kitchen") {
                // Mecânica de Alimentar
                if (pou.coins >= 5) {
                    pou.hunger = Math.min(100, pou.hunger + 15);
                    pou.coins -= 5;
                    pou.xp += 10;
                    if(pou.xp >= pou.level * 50) { pou.level++; pou.xp = 0; }
                    
                    // Animação de comer
                    pouChar.classList.add('eating');
                    setTimeout(() => pouChar.classList.remove('eating'), 500);
                } else { alert("Sem moedas suficientes!"); }
            } 
            else if (currentRoom === "bedroom") {
                // Mecânica de Dormir
                pou.isSleeping = !pou.isSleeping;
                actionTrigger.innerText = pou.isSleeping ? "💡" : "🌙";
                if(pou.isSleeping) {
                    roomContent.style.backgroundColor = "#111";
                } else {
                    roomContent.style.backgroundColor = "var(--bg-bedroom)";
                }
            }
            updateUI();
            saveData();
        });

        // 4. MULTIPLAYER REAL-TIME (SINCRO DE OUTROS JOGADORES)
        const modal = document.getElementById('social-modal');
        document.getElementById('btn-open-social').addEventListener('click', () => {
            modal.style.display = 'block';
            
            // Escuta mudanças na coleção global de pous e lista em tempo real
            onSnapshot(collection(db, "pous"), (snapshot) => {
                const socialBody = document.getElementById('social-body');
                socialBody.innerHTML = "";

                snapshot.forEach((otherDoc) => {
                    const data = otherDoc.data();
                    if (otherDoc.id === auth.currentUser.uid) return; // ignora a si mesmo

                    const row = document.createElement('div');
                    row.className = 'player-row';
                    row.innerHTML = `
                        <div>
                            <strong>${data.name}</strong> <span style="font-size:12px;">(Nív. ${data.level})</span>
                            <br><span style="font-size:11px; color:#7f8c8d;">❤️ ${data.likes || 0} curtidas</span>
                        </div>
                        <button class="like-btn" data-id="${otherDoc.id}" style="background:#e74c3c; color:white; border:none; padding:8px 12px; border-radius:8px; cursor:pointer;">❤️ Curtir</button>
                    `;
                    socialBody.appendChild(row);
                });

                // Botão de curtida síncrono funcional
                document.querySelectorAll('.like-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const targetId = e.target.dataset.id;
                        await updateDoc(doc(db, "pous", targetId), { likes: increment(1) });
                        alert("Você deu um Like no Pou dele em tempo real!");
                    });
                });
            });
        });

        document.getElementById('close-modal').addEventListener('click', () => modal.style.display = 'none');
    </script>
</body>
</html>
