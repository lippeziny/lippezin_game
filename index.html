<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pou Online Multiplayer</title>
    <style>
        :root {
            --pou-skin: #b5835a;
            --color-kitchen: #f39c12;
            --color-bedroom: #2c3e50;
            --color-playroom: #3498db;
            --color-bathroom: #1abc9c;
            --color-yard: #74b9ff;
        }
        
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background-color: #1a1a1a; display: flex; align-items: center; justify-content: center; font-family: 'Arial Rounded MT Bold', sans-serif; overflow: hidden; }

        /* VIEWPORT ADAPTÁVEL E TRAVADA (SEM ROLAGEM) */
        .game-viewport {
            width: 100vw; height: 100vh; max-width: 450px; max-height: 100vh;
            position: relative; display: flex; flex-direction: column; overflow: hidden;
            background: #000;
        }
        @media (min-width: 460px) {
            .game-viewport { border: 8px solid #2d3436; border-radius: 30px; height: 95vh; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        }

        .screen { display: none; width: 100%; height: 100%; position: relative; flex-direction: column; overflow: hidden; }
        .screen.active { display: flex; }

        /* WALLPAPERS IMERSIVOS */
        .wallpaper { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; transition: background 0.3s; }
        .tex-stripes { background-image: linear-gradient(90deg, rgba(255,255,255,0.12) 50%, transparent 50%); background-size: 35px 100%; }
        .tex-chess { background-image: linear-gradient(45deg, rgba(255,255,255,0.08) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.08) 75%), linear-gradient(45deg, rgba(255,255,255,0.08) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.08) 75%); background-size: 30px 30px; background-position: 0 0, 15px 15px; }
        .tex-smooth { background-image: none; }

        /* TELA DE LOGIN */
        #auth-screen { background: #55efc4; align-items: center; justify-content: center; }
        .auth-box { background: #fff; padding: 25px 20px; border-radius: 25px; border: 4px solid #333; text-align: center; width: 85%; box-shadow: 0 8px 0 #333; }
        .auth-box input { padding: 12px; width: 90%; margin: 15px 0; border: 4px solid #333; border-radius: 15px; font-size: 18px; text-align: center; font-weight: bold; font-family: inherit; }
        
        .pou-btn { background: #2ecc71; color: white; padding: 12px 25px; border: 4px solid #333; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #1e7e34; font-family: inherit; }
        .pou-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #1e7e34; }

        /* HUD DINÂMICO */
        #hud { position: absolute; top: 0; left: 0; width: 100%; padding: 12px; display: flex; justify-content: space-between; align-items: center; z-index: 10; background: linear-gradient(to bottom, rgba(0,0,0,0.25), transparent); }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; width: 45%; }
        .stat-bar { display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.9); border: 2px solid #333; padding: 2px 5px; border-radius: 6px; font-size: 11px; font-weight: bold;}
        .progress { width: 100%; height: 8px; background: #dfe6e9; border-radius: 4px; overflow: hidden; }
        .fill { height: 100%; width: 100%; background: #2ecc71; transition: width 0.3s; }
        
        .user-info { display: flex; flex-direction: column; align-items: flex-end; color: white; font-weight: bold; text-shadow: 2px 2px 0 #333; font-size: 12px;}
        .coin-tag { background: #ffeaa7; border: 2px solid #333; padding: 1px 6px; border-radius: 8px; margin-top: 2px; color: #333; text-shadow: none; font-size: 12px;}
        #btn-settings-toggle { background: rgba(255,255,255,0.9); border: 2px solid #333; font-size: 16px; width: 32px; height: 32px; border-radius: 6px; cursor: pointer; box-shadow: 0 2px 0 #333; margin-left: 5px;}

        /* ÁREA CENTRAL E DE NAVEGAÇÃO */
        #room-container { flex: 1; display: flex; align-items: center; justify-content: space-between; z-index: 2; width: 100%; position: relative; padding: 0 10px; margin-top: 50px; }
        #room-content { flex: 1; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        .nav-btn { background: rgba(255,255,255,0.75); border: 3px solid #333; color: #333; padding: 10px 12px; cursor: pointer; font-size: 18px; font-weight: bold; border-radius: 12px; z-index: 15; box-shadow: 0 4px 0 #333; }
        .nav-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #333; }

        /* CENÁRIOS INDIVIDUAIS */
        .scenery-element { position: absolute; z-index: 2; pointer-events: none; }
        .kitchen-shelf { top: 110px; left: 12.5%; width: 75%; height: 16px; background: #d7ccc8; border: 2.5px solid #333; border-radius: 4px; box-shadow: 0 4px 0 rgba(0,0,0,0.15); }
        .bathroom-tub { bottom: 130px; left: 30px; width: 75px; height: 40px; background: #e0f7fa; border: 2.5px solid #333; border-radius: 0 0 15px 15px; }
        .bedroom-lamp { top: 120px; right: 30px; font-size: 40px; }
        .playroom-console { bottom: 130px; right: 30px; font-size: 35px; }
        
        /* Quintal Fixo na base */
        .yard-grass { bottom: 0; left: 0; width: 100%; height: 120px; background: #2ecc71; border-top: 4px solid #333; z-index: 2; position: absolute; }
        .yard-sun { top: 80px; left: 35px; font-size: 45px; animation: floatSun 4s ease-in-out infinite alternate; }
        .yard-house { bottom: 105px; right: 20px; font-size: 80px; filter: drop-shadow(4px 4px 0 rgba(0,0,0,0.1)); }
        @keyframes floatSun { from { transform: translateY(0); } to { transform: translateY(-8px); } }

        /* O PERSONAGEM POU */
        #pou-character {
            width: 150px; height: 130px; background: var(--pou-skin);
            border-radius: 50% 50% 43% 43% / 63% 63% 37% 37%;
            position: relative; box-shadow: inset 0 -12px 0 rgba(0,0,0,0.15), 0 10px 0px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 3; margin-top: 20px; transition: transform 0.2s, width 0.2s, height 0.2s;
        }
        .eyes { display: flex; gap: 20px; margin-top: -20px; }
        .eye { width: 40px; height: 40px; background: white; border-radius: 50%; border: 3.5px solid #333; position: relative; display: flex; align-items: center; justify-content: center; }
        .pupil { width: 14px; height: 14px; background: #000; border-radius: 50%; }
        .mouth { width: 32px; height: 14px; border: 3.5px solid #333; border-top: none; border-radius: 0 0 18px 18px; margin-top: 15px; }
        
        #pou-character.eating .mouth { width: 22px; height: 22px; background: #333; border-radius: 50%; }
        #pou-character.sleeping .eye { height: 5px; background: #333; border-radius: 0; border: none; width: 32px; }
        #pou-character.sleeping .pupil { display: none; }
        #pou-character.sleeping .mouth { width: 18px; height: 4px; border: none; background: #333; border-radius: 2px; }

        /* BOTÕES DE INTERAÇÃO */
        #room-actions { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 4; }
        .emoji-box { background: #fff; border: 3.5px solid #333; border-radius: 18px; width: 65px; height: 65px; font-size: 32px; cursor: pointer; box-shadow: 0 5px 0 #333; display: flex; align-items: center; justify-content: center; }
        .emoji-box:active { transform: translateY(3px); box-shadow: 0 2px 0 #333; }
        
        #paint-bucket { font-size: 34px; cursor: pointer; background: white; border: 3.5px solid #333; border-radius: 50%; width: 65px; height: 65px; display: none; align-items: center; justify-content: center; box-shadow: 0 5px 0 #333;}
        #paint-bucket:active { transform: translateY(3px); box-shadow: 0 2px 0 #333; }

        /* RODAPÉ DO MENU */
        #game-menu { height: 65px; background: #fff; border-top: 4px solid #333; display: flex; justify-content: center; align-items: center; padding: 8px; z-index: 4; }
        .social-trigger-btn { background: #9b59b6; color: white; border: 3px solid #333; box-shadow: 0 4px 0 #333; width: 95%; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; height: 42px; font-family: inherit;}
        .social-trigger-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #333; }

        /* MODAIS REESTRUTURADOS (AJUSTE PERFEITO NA TELA) */
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; padding: 15px; }
        .modal-content { background: white; margin: 10vh auto; padding: 20px 15px; width: 100%; max-width: 390px; border-radius: 20px; border: 4px solid #333; position: relative; box-shadow: 0 10px 0 rgba(0,0,0,0.3); display: flex; flex-direction: column; max-height: 75vh; }
        .close-btn { position: absolute; right: 12px; top: 8px; font-size: 28px; cursor: pointer; font-weight: bold; z-index: 10; }
        
        .palette-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; }
        .color-dot { width: 100%; height: 40px; border-radius: 10px; border: 2.5px solid #333; cursor: pointer; box-shadow: 0 2px 0 #333; }
        .tex-btn { background: #eee; border: 2.5px solid #333; border-radius: 10px; padding: 8px; font-weight: bold; cursor: pointer; font-family: inherit; font-size: 13px; }

        /* LISTA SOCIAL DE VIZINHOS */
        .social-layout { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex: 1; margin-top: 10px; padding-right: 2px; }
        .player-row { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; border: 2.5px solid #333; padding: 10px; border-radius: 12px; margin-bottom: 5px; }

        /* SEÇÃO DO CHAT INTEGRADO */
        .chat-section { border-top: 3px solid #333; margin-top: 10px; padding-top: 10px; display: flex; flex-direction: column; height: 180px; }
        .chat-messages { flex: 1; overflow-y: auto; background: #f1f2f6; border: 2px solid #333; border-radius: 8px; padding: 6px; font-size: 12px; margin-bottom: 6px; }
        .msg-line { margin-bottom: 4px; word-break: break-all; }
        .chat-input-row { display: flex; gap: 5px; }
        .chat-input-row input { flex: 1; padding: 8px; border: 2px solid #333; border-radius: 8px; font-family: inherit; font-size: 13px; }
        .chat-input-row button { background: #3498db; color: white; border: 2px solid #333; border-radius: 8px; padding: 0 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="game-viewport">

        <!-- TELA DE LOGIN -->
        <div id="auth-screen" class="screen active">
            <div class="auth-box">
                <h1>Pou Online 🥔</h1>
                <p style="font-weight:bold; color:#7f8c8d; margin-bottom:10px;">O Retorno Multiplayer</p>
                <input type="text" id="pou-nickname-input" placeholder="Apelido do seu Pou" maxlength="12">
                <button id="btn-play-guest" class="pou-btn">ENTRAR NO APP</button>
            </div>
        </div>

        <!-- TELA DO JOGO PRINCIPAL -->
        <div id="game-screen" class="screen">
            <div id="dynamic-wallpaper" class="wallpaper tex-stripes"></div>

            <header id="hud">
                <div class="stats-grid">
                    <div class="stat-bar">🍖<div class="progress"><div id="bar-hunger" class="fill"></div></div></div>
                    <div class="stat-bar">❤️<div class="progress"><div id="bar-health" class="fill"></div></div></div>
                    <div class="stat-bar">🕹️<div class="progress"><div id="bar-fun" class="fill"></div></div></div>
                    <div class="stat-bar">⚡<div class="progress"><div id="bar-energy" class="fill"></div></div></div>
                </div>
                <div class="user-info">
                    <span id="pou-name">Pou</span>
                    <span id="pou-level">Nível 1</span>
                    <div class="coin-tag" id="pou-coins">🪙 150</div>
                </div>
                <button id="btn-settings-toggle">⚙️</button>
            </header>

            <main id="room-container">
                <button id="nav-left" class="nav-btn">◀</button>
                
                <div id="room-content">
                    <div id="scenery-canvas" style="width:100%; height:100%; position:absolute; top:0; left:0; pointer-events:none;"></div>

                    <div id="pou-character">
                        <div class="eyes">
                            <div class="eye"><div class="pupil"></div></div>
                            <div class="eye"><div class="pupil"></div></div>
                        </div>
                        <div class="mouth"></div>
                    </div>

                    <div id="room-actions">
                        <button id="action-trigger" class="emoji-box">🍔</button>
                        <button id="paint-bucket">🎨</button>
                    </div>
                </div>

                <button id="nav-right" class="nav-btn">▶</button>
            </main>

            <footer id="game-menu">
                <button id="btn-open-social" class="social-trigger-btn">🌐 CONVERSAR & VIZINHOS ONLINE</button>
            </footer>
        </div>

        <!-- MODAL DE CONFIGURAÇÕES -->
        <div id="settings-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" id="close-settings">&times;</span>
                <h3 style="text-align:center; margin-bottom:15px; border-bottom:3px solid #333; padding-bottom:5px;">Ajustes ⚙️</h3>
                <div style="display:flex; flex-direction:colum; gap:10px;">
                    <p style="font-weight:bold; margin-bottom:10px;">Sons ativos para melhor imersão portátil do seu Pou.</p>
                </div>
                <button id="btn-save-account" class="pou-btn" style="background:#3498db; box-shadow:0 4px 0 #217dbb; font-size:14px; width:100%;">💾 Salvar Progresso no Google</button>
            </div>
        </div>

        <!-- MODAL DO BALDE DE TINTA (CUSTOMIZAÇÃO) -->
        <div id="paint-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" id="close-paint">&times;</span>
                <h3 style="text-align:center; border-bottom:3px solid #333; padding-bottom:5px;">Loja de Tintas 🎨</h3>
                
                <p style="font-weight:bold; margin: 10px 0 5px 0; font-size:14px;">1. Cor do Papel:</p>
                <div class="palette-grid">
                    <div class="color-dot" data-color="#f39c12" style="background:#f39c12;"></div>
                    <div class="color-dot" data-color="#2c3e50" style="background:#2c3e50;"></div>
                    <div class="color-dot" data-color="#3498db" style="background:#3498db;"></div>
                    <div class="color-dot" data-color="#1abc9c" style="background:#1abc9c;"></div>
                    <div class="color-dot" data-color="#e74c3c" style="background:#e74c3c;"></div>
                    <div class="color-dot" data-color="#9b59b6" style="background:#9b59b6;"></div>
                    <div class="color-dot" data-color="#2ecc71" style="background:#2ecc71;"></div>
                    <div class="color-dot" data-color="#ff7675" style="background:#ff7675;"></div>
                </div>

                <p style="font-weight:bold; margin:15px 0 5px 0; font-size:14px;">2. Estampa Clássica:</p>
                <div style="display:flex; gap:8px;">
                    <button class="tex-btn" data-tex="tex-stripes" style="flex:1;">Listras Pou</button>
                    <button class="tex-btn" data-tex="tex-chess" style="flex:1;">Xadrez</button>
                    <button class="tex-btn" data-tex="tex-smooth" style="flex:1;">Lisa</button>
                </div>
            </div>
        </div>

        <!-- MODAL VIZINHOS + CHAT MULTIPLAYER -->
        <div id="social-modal" class="modal">
            <div class="modal-content" style="max-height: 85vh;">
                <span class="close-btn" id="close-social">&times;</span>
                <h3 style="text-align:center; border-bottom:3px solid #333; padding-bottom:5px;">Comunidade Pou 🌍</h3>
                
                <!-- Lista de Vizinhos -->
                <div id="social-body" class="social-layout"></div>

                <!-- Aba de Chat Global Dinâmico -->
                <div class="chat-section">
                    <p style="font-weight:bold; font-size:13px; margin-bottom:4px;">💬 Chat Global Ao Vivo:</p>
                    <div id="chat-messages" class="chat-messages"></div>
                    <div class="chat-input-row">
                        <input type="text" id="chat-input-msg" placeholder="Digite sua mensagem..." maxlength="60">
                        <button id="btn-send-chat">Enviar</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- SCRIPT LOGIC REALTIME -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously, GoogleAuthProvider, linkWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, increment, addDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKtqyAvo8nNebINI6iIbFwyYyXomp-55M",
            authDomain: "lippezingame.firebaseapp.com",
            projectId: "lippezingame",
            storageBucket: "lippezingame.firebasestorage.app",
            messagingSenderId: "690275116956",
            appId: "1:690275116956:web:c26a22dac3c07f56130a59"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let pou = null;
        let userDocRef = null;
        
        const rooms = ["kitchen", "bathroom", "playroom", "bedroom", "yard"];
        let roomIdx = 0;

        let roomStyles = {
            kitchen: { color: "#f39c12", texture: "tex-stripes" },
            bathroom: { color: "#1abc9c", texture: "tex-stripes" },
            playroom: { color: "#3498db", texture: "tex-stripes" },
            bedroom: { color: "#2c3e50", texture: "tex-stripes" },
            yard: { color: "#74b9ff", texture: "tex-smooth" }
        };

        // ENTRADA DO JOGO
        document.getElementById('btn-play-guest').addEventListener('click', async () => {
            const nameField = document.getElementById('pou-nickname-input').value.trim();
            sessionStorage.setItem('pou_name', nameField || "Pou Solitário");
            await signInAnonymously(auth);
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.remove('active');
                document.getElementById('game-screen').classList.add('active');
                
                userDocRef = doc(db, "pous", user.uid);
                const docSnap = await getDoc(userDocRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    pou = data.pouState;
                    if(data.roomStyles) roomStyles = data.roomStyles;
                } else {
                    pou = { name: sessionStorage.getItem('pou_name'), level: 1, xp: 0, coins: 250, hunger: 100, health: 100, fun: 100, energy: 100, isSleeping: false };
                    await setDoc(userDocRef, { pouState: pou, roomStyles: roomStyles });
                }
                renderRoom();
                setupChatListener();
                setInterval(gameTick, 12000);
            }
        });

        function gameTick() {
            if (!pou) return;
            if (pou.isSleeping) { pou.energy = Math.min(100, pou.energy + 10); } 
            else { pou.hunger = Math.max(0, pou.hunger - 2); pou.energy = Math.max(0, pou.energy - 1); pou.fun = Math.max(0, pou.fun - 2); }
            updateHUD();
            updateDoc(userDocRef, { pouState: pou });
        }

        function updateHUD() {
            document.getElementById('bar-hunger').style.width = `${pou.hunger}%`;
            document.getElementById('bar-health').style.width = `${pou.health}%`;
            document.getElementById('bar-fun').style.width = `${pou.fun}%`;
            document.getElementById('bar-energy').style.width = `${pou.energy}%`;
            document.getElementById('pou-name').innerText = pou.name;
            document.getElementById('pou-level').innerText = `Nível ${pou.level}`;
            document.getElementById('pou-coins').innerText = `🪙 ${pou.coins}`;
        }

        // CONTROLADOR DE NAVEGAÇÃO DOS CÔMODOS CORRIGIDO
        function renderRoom() {
            if(!pou) return;
            const currentRoom = rooms[roomIdx];
            const wallpaper = document.getElementById('dynamic-wallpaper');
            const canvas = document.getElementById('scenery-canvas');
            const actionBtn = document.getElementById('action-trigger');
            const paintBucket = document.getElementById('paint-bucket');
            const pouChar = document.getElementById('pou-character');

            // Garante aplicação limpa de cores
            wallpaper.style.backgroundColor = roomStyles[currentRoom].color;
            wallpaper.className = `wallpaper ${roomStyles[currentRoom].texture}`;

            canvas.innerHTML = "";
            paintBucket.style.display = "none";
            actionBtn.style.display = "flex";
            pouChar.style.transform = "translateY(0px)";

            if (currentRoom === "kitchen") {
                actionBtn.innerText = "🍔";
                canvas.innerHTML = `<div class="scenery-element kitchen-shelf"></div>`;
            } 
            else if (currentRoom === "bathroom") {
                actionBtn.innerText = "🧼";
                canvas.innerHTML = `<div class="scenery-element bathroom-tub"></div>`;
            } 
            else if (currentRoom === "playroom") {
                actionBtn.innerText = "⚽";
                canvas.innerHTML = `<div class="scenery-element playroom-console">🎮</div>`;
            } 
            else if (currentRoom === "bedroom") {
                actionBtn.innerText = pou.isSleeping ? "💡" : "🌙";
                canvas.innerHTML = `<div class="scenery-element bedroom-lamp">🛋️</div>`;
                if(pou.isSleeping) wallpaper.style.backgroundColor = "#111c24";
            } 
            else if (currentRoom === "yard") {
                actionBtn.style.display = "none";
                paintBucket.style.display = "flex";
                pouChar.style.transform = "translateY(40px)";
                canvas.innerHTML = `
                    <div class="yard-sun">☀️</div>
                    <div class="yard-house">🏡</div>
                    <div class="yard-grass"></div>
                `;
            }

            pouChar.className = "";
            if (pou.isSleeping && currentRoom === "bedroom") pouChar.classList.add('sleeping');
            updateHUD();
        }

        document.getElementById('nav-right').addEventListener('click', () => { roomIdx = (roomIdx + 1) % rooms.length; renderRoom(); });
        document.getElementById('nav-left').addEventListener('click', () => { roomIdx = (roomIdx - 1 + rooms.length) % rooms.length; renderRoom(); });

        // BOTÃO DE AÇÃO DOS CÔMODOS
        document.getElementById('action-trigger').addEventListener('click', () => {
            const currentRoom = rooms[roomIdx];
            if (currentRoom === "kitchen" && pou.coins >= 5) {
                pou.hunger = Math.min(100, pou.hunger + 15); pou.coins -= 5; pou.xp += 10;
            } else if (currentRoom === "bathroom") {
                pou.health = Math.min(100, pou.health + 10); pou.xp += 5;
            } else if (currentRoom === "playroom") {
                pou.fun = Math.min(100, pou.fun + 20); pou.coins += 5; pou.xp += 12;
            } else if (currentRoom === "bedroom") {
                pou.isSleeping = !pou.isSleeping;
                renderRoom();
            }
            if(pou.xp >= pou.level * 50) { pou.level++; pou.xp = 0; }
            updateDoc(userDocRef, { pouState: pou });
            updateHUD();
        });

        // BALDE DE TINTA INTERATIVO (QUINTAL)
        const paintModal = document.getElementById('paint-modal');
        document.getElementById('paint-bucket').addEventListener('click', () => paintModal.style.display = 'block');
        document.getElementById('close-paint').addEventListener('click', () => paintModal.style.display = 'none');

        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', (e) => {
                roomStyles[rooms[roomIdx]].color = e.target.dataset.color;
                renderRoom();
                updateDoc(userDocRef, { roomStyles: roomStyles });
            });
        });

        document.querySelectorAll('.tex-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                roomStyles[rooms[roomIdx]].texture = e.target.dataset.tex;
                renderRoom();
                updateDoc(userDocRef, { roomStyles: roomStyles });
            });
        });

        // MODAL DE CONFIGURAÇÃO 
        const setModal = document.getElementById('settings-modal');
        document.getElementById('btn-settings-toggle').addEventListener('click', () => setModal.style.display = 'block');
        document.getElementById('close-settings').addEventListener('click', () => setModal.style.display = 'none');

        // MULTIPLAYER SESSÃO VIZINHOS CORRIGIDA
        const socModal = document.getElementById('social-modal');
        document.getElementById('btn-open-social').addEventListener('click', () => {
            socModal.style.display = 'block';
            onSnapshot(collection(db, "pous"), (snap) => {
                const body = document.getElementById('social-body'); 
                body.innerHTML = "";
                snap.forEach(docSnap => {
                    if(docSnap.id === auth.currentUser.uid) return;
                    const vState = docSnap.data().pouState;
                    if(!vState) return;
                    const row = document.createElement('div'); 
                    row.className = 'player-row';
                    row.innerHTML = `<div><strong>${vState.name}</strong> <span style="font-size:11px;">(Nív. ${vState.level})</span></div>
                                     <button class="like-btn" data-id="${docSnap.id}" style="background:#e74c3c; color:white; border:2px solid #333; padding:4px 8px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:12px;">❤️ Curtir</button>`;
                    body.appendChild(row);
                });
                
                document.querySelectorAll('.like-btn').forEach(b => b.addEventListener('click', async (e) => { 
                    await updateDoc(doc(db, "pous", e.target.dataset.id), { "pouState.coins": increment(10) });
                    alert("Você visitou e deu uma curtida no Pou vizinho!");
                }));
            });
        });
        document.getElementById('close-social').addEventListener('click', () => socModal.style.display = 'none');

        // SISTEMA DE CHAT EM TEMPO REAL MULTIPLAYER
        function setupChatListener() {
            const q = query(collection(db, "global_chat"), orderBy("timestamp", "asc"), limit(30));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('chat-messages');
                container.innerHTML = "";
                snapshot.forEach((doc) => {
                    const msg = doc.data();
                    const line = document.createElement('div');
                    line.className = "msg-line";
                    line.innerHTML = `<strong>${msg.sender}:</strong> ${msg.text}`;
                    container.appendChild(line);
                });
                container.scrollTop = container.scrollHeight; // Auto-scroll para as últimas mensagens
            });
        }

        document.getElementById('btn-send-chat').addEventListener('click', async () => {
            const input = document.getElementById('chat-input-msg');
            const text = input.value.trim();
            if(text.length === 0 || !pou) return;

            await addDoc(collection(db, "global_chat"), {
                sender: pou.name,
                text: text,
                timestamp: Date.now()
            });
            input.value = "";
        });
    </script>
</body>
</html>
