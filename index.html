<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pou Online Multiplayer</title>
    <style>
        :root { --pou-skin: #b5835a; }
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; touch-action: manipulation; }
        html, body { position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; background-color: #222; display: flex; align-items: center; justify-content: center; font-family: sans-serif; overflow: hidden; }
        .game-viewport { width: 100%; height: 100%; max-width: 450px; position: relative; display: flex; flex-direction: column; background: #ffeaa7; overflow: hidden; }
        @media (min-width: 460px) { .game-viewport { height: 95%; border: 8px solid #2d3436; border-radius: 30px; } }
        .screen { display: none; width: 100%; height: 100%; position: absolute; top:0; left:0; flex-direction: column; overflow: hidden; z-index: 1; }
        .screen.active { display: flex; }
        #dynamic-wallpaper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; background-color: #f39c12; }
        .tex-stripes { background-image: linear-gradient(90deg, rgba(255,255,255,0.15) 50%, transparent 50%); background-size: 35px 100%; }
        .tex-chess { background-image: linear-gradient(45deg, rgba(255,255,255,0.1) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.1) 75%), linear-gradient(45deg, rgba(255,255,255,0.1) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.1) 75%); background-size: 30px 30px; background-position: 0 0, 15px 15px; }
        #auth-screen { background: #55efc4; align-items: center; justify-content: center; z-index: 100; }
        .auth-box { background: #fff; padding: 25px 20px; border-radius: 25px; border: 4px solid #333; text-align: center; width: 85%; }
        .auth-box input { padding: 12px; width: 90%; margin: 15px 0; border: 4px solid #333; border-radius: 15px; font-size: 18px; text-align: center; font-weight: bold; }
        .pou-btn { background: #2ecc71; color: white; padding: 12px 25px; border: 4px solid #333; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #hud { flex: 0 0 auto; padding: 12px; display: flex; justify-content: space-between; align-items: center; z-index: 10; background: rgba(0,0,0,0.4); color: white; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; width: 45%; }
        .stat-bar { display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.9); border: 2px solid #333; padding: 2px 5px; border-radius: 6px; font-size: 11px; color: #333; font-weight: bold;}
        .progress { width: 100%; height: 8px; background: #dfe6e9; border-radius: 4px; overflow: hidden; }
        .fill { height: 100%; width: 100%; background: #2ecc71; }
        #room-container { flex: 1 1 auto; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 2; padding: 0 10px; }
        #room-content { flex: 1; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .nav-btn { background: white; border: 3px solid #333; padding: 12px 15px; cursor: pointer; font-size: 20px; font-weight: bold; border-radius: 12px; z-index: 15; }
        #pou-character { width: 140px; height: 120px; background: var(--pou-skin); border-radius: 50% 50% 43% 43% / 63% 63% 37% 37%; position: relative; border: 3px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 3; }
        .eyes { display: flex; gap: 18px; }
        .eye { width: 36px; height: 36px; background: white; border-radius: 50%; border: 3px solid #333; display: flex; align-items: center; justify-content: center; }
        .pupil { width: 14px; height: 14px; background: #000; border-radius: 50%; }
        .mouth { width: 30px; height: 12px; border: 3px solid #333; border-top: none; border-radius: 0 0 18px 18px; margin-top: 12px; }
        #room-actions { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 10; }
        .emoji-box, #paint-bucket { background: #fff; border: 3.5px solid #333; border-radius: 18px; width: 65px; height: 65px; font-size: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #game-menu { flex: 0 0 65px; background: #fff; border-top: 4px solid #333; display: flex; justify-content: center; align-items: center; padding: 8px; z-index: 10; }
        .social-trigger-btn { background: #9b59b6; color: white; border: 3px solid #333; width: 95%; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; height: 45px; }
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; padding: 15px; }
        .modal-content { background: white; margin: auto; padding: 15px; width: 100%; max-width: 380px; border-radius: 20px; border: 4px solid #333; position: relative; display: flex; flex-direction: column; max-height: 90%; top: 5%; }
        .close-btn { position: absolute; right: 12px; top: 8px; font-size: 28px; cursor: pointer; font-weight: bold; }
        .social-layout { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; max-height: 150px; margin-top: 10px; }
        .player-row { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; border: 2.5px solid #333; padding: 8px; border-radius: 10px; color: #333; }
        .chat-section { border-top: 3px solid #333; margin-top: 10px; padding-top: 10px; display: flex; flex-direction: column; flex: 1; min-height: 150px; }
        .chat-messages { flex: 1; overflow-y: auto; background: #f1f2f6; border: 2px solid #333; border-radius: 8px; padding: 8px; font-size: 13px; margin-bottom: 8px; color: #333; text-align: left; }
        .msg-line { margin-bottom: 5px; word-break: break-word; }
        .chat-input-row { display: flex; gap: 5px; height: 40px; }
        .chat-input-row input { flex: 1; padding: 8px; border: 2px solid #333; border-radius: 8px; font-size: 14px; }
        .chat-input-row button { background: #3498db; color: white; border: 2px solid #333; border-radius: 8px; padding: 0 15px; font-weight: bold; cursor: pointer; }
        .yard-grass { bottom: 0; left: 0; width: 100%; height: 25%; background: #2ecc71; border-top: 4px solid #333; z-index: 2; position: absolute; }
    </style>
</head>
<body>

    <div class="game-viewport">
        <!-- TELA DE LOGIN -->
        <div id="auth-screen" class="screen active">
            <div class="auth-box">
                <h1>Pou Online 🥔</h1>
                <input type="text" id="pou-nickname-input" placeholder="Apelido do Pou" maxlength="12" value="Jogador">
                <button id="btn-play-guest" class="pou-btn">JOGAR AGORA</button>
            </div>
        </div>

        <!-- TELA DO JOGO -->
        <div id="game-screen" class="screen">
            <div id="dynamic-wallpaper"></div>

            <header id="hud">
                <div class="stats-grid">
                    <div class="stat-bar">🍖<div class="progress"><div id="bar-hunger" class="fill"></div></div></div>
                    <div class="stat-bar">❤️<div class="progress"><div id="bar-health" class="fill"></div></div></div>
                </div>
                <div class="user-info">
                    <span id="pou-name">Pou</span> <span id="pou-coins">🪙 150</span>
                </div>
            </header>

            <main id="room-container">
                <button id="nav-left" class="nav-btn">◀</button>
                <div id="room-content">
                    <div id="scenery-canvas" style="width:100%; height:100%; position:absolute; top:0; left:0; pointer-events:none;"></div>
                    <div id="pou-character">
                        <div class="eyes"><div class="eye"><div class="pupil"></div></div><div class="eye"><div class="pupil"></div></div></div>
                        <div class="mouth"></div>
                    </div>
                    <div id="room-actions">
                        <button id="action-trigger" class="emoji-box">🍔</button>
                    </div>
                </div>
                <button id="nav-right" class="nav-btn">▶</button>
            </main>

            <footer id="game-menu">
                <button id="btn-open-social" class="social-trigger-btn">🌐 ABRIR CHAT E VIZINHOS</button>
            </footer>
        </div>

        <!-- MODAL SOCIAL -->
        <div id="social-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" id="close-social">&times;</span>
                <h3>Comunidade Pou 🌍</h3>
                <div id="social-body" class="social-layout"></div>
                <div class="chat-section">
                    <div id="chat-messages" class="chat-messages"></div>
                    <div class="chat-input-row">
                        <input type="text" id="chat-input-msg" placeholder="Mensagem..." maxlength="50">
                        <button id="btn-send-chat">Enviar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, addDoc, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKtqyAvo8nNebINI6iIbFwyYyXomp-55M",
            authDomain: "lippezingame.firebaseapp.com",
            projectId: "lippezingame",
            storageBucket: "lippezingame.firebasestorage.app",
            messagingSenderId: "690275116956",
            appId: "1:690275116956:web:c26a22dac3c07f56130a59"
        };

        // Força inicialização segura
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let pou = { name: "Pou", hunger: 100, health: 100, coins: 150 };
        let userDocRef = null;
        const rooms = ["kitchen", "bathroom", "playroom", "bedroom", "yard"];
        let roomIdx = 0;

        const roomStyles = {
            kitchen: { color: "#f39c12", texture: "tex-stripes" },
            bathroom: { color: "#1abc9c", texture: "tex-stripes" },
            playroom: { color: "#3498db", texture: "tex-stripes" },
            bedroom: { color: "#2c3e50", texture: "tex-stripes" },
            yard: { color: "#74b9ff", texture: "" }
        };

        document.getElementById('btn-play-guest').addEventListener('click', async () => {
            const nameField = document.getElementById('pou-nickname-input').value.trim();
            pou.name = nameField || "Pou Solitário";
            try {
                await signInAnonymously(auth);
            } catch(e) {
                console.log("Erro login, iniciando modo local forçado");
                startGameLocal();
            }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userDocRef = doc(db, "pous", user.uid);
                try {
                    const docSnap = await getDoc(userDocRef);
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if(data.pouState) pou = data.pouState;
                    } else {
                        await setDoc(userDocRef, { pouState: pou });
                    }
                } catch(e) { console.log("Erro Firestore, rodando com dados locais"); }
                startGameLocal();
            }
        });

        function startGameLocal() {
            document.getElementById('auth-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            renderRoom();
            setupChatListener();
        }

        function renderRoom() {
            const currentRoom = rooms[roomIdx];
            const wallpaper = document.getElementById('dynamic-wallpaper');
            const canvas = document.getElementById('scenery-canvas');
            const actionBtn = document.getElementById('action-trigger');

            // SISTEMA ANTI-TELA BRANCA: Força cores de fallback caso falte algo
            const style = roomStyles[currentRoom] || { color: "#f39c12", texture: "" };
            wallpaper.style.backgroundColor = style.color;
            wallpaper.className = style.texture;

            canvas.innerHTML = "";
            actionBtn.style.display = "flex";

            if (currentRoom === "kitchen") { actionBtn.innerText = "🍔"; } 
            else if (currentRoom === "bathroom") { actionBtn.innerText = "🧼"; } 
            else if (currentRoom === "playroom") { actionBtn.innerText = "⚽"; } 
            else if (currentRoom === "bedroom") { actionBtn.innerText = "🌙"; } 
            else if (currentRoom === "yard") { 
                actionBtn.style.display = "none"; 
                canvas.innerHTML = `<div class="yard-grass"></div><div style="position:absolute; top:20%; left:20px; font-size:40px;">☀️</div>`; 
            }

            document.getElementById('bar-hunger').style.width = `${pou.hunger}%`;
            document.getElementById('bar-health').style.width = `${pou.health}%`;
            document.getElementById('pou-name').innerText = pou.name;
            document.getElementById('pou-coins').innerText = `🪙 ${pou.coins}`;
        }

        // Cliques de Navegação diretos e sem validações complexas que travam
        document.getElementById('nav-right').addEventListener('click', () => { roomIdx = (roomIdx + 1) % rooms.length; renderRoom(); });
        document.getElementById('nav-left').addEventListener('click', () => { roomIdx = (roomIdx - 1 + rooms.length) % rooms.length; renderRoom(); });

        // Modais básicos
        const socModal = document.getElementById('social-modal');
        document.getElementById('btn-open-social').addEventListener('click', () => { socModal.style.display = 'block'; loadNeighbors(); });
        document.getElementById('close-social').addEventListener('click', () => socModal.style.display = 'none');

        function loadNeighbors() {
            try {
                onSnapshot(collection(db, "pous"), (snap) => {
                    const body = document.getElementById('social-body'); body.innerHTML = "";
                    snap.forEach(docSnap => {
                        const data = docSnap.data().pouState;
                        if(!data || docSnap.id === auth.currentUser?.uid) return;
                        const row = document.createElement('div'); row.className = 'player-row';
                        row.innerHTML = `<div><strong>${data.name}</strong></div><span style="font-size:12px;color:#2ecc71;">● Online</span>`;
                        body.appendChild(row);
                    });
                });
            } catch(e){}
        }

        function setupChatListener() {
            try {
                const q = query(collection(db, "global_chat"), orderBy("timestamp", "asc"), limit(25));
                onSnapshot(q, (snapshot) => {
                    const container = document.getElementById('chat-messages');
                    container.innerHTML = "";
                    snapshot.forEach((doc) => {
                        const msg = doc.data();
                        const line = document.createElement('div');
                        line.className = "msg-line";
                        line.innerHTML = `<strong>${msg.sender}:</strong> ${msg.text}`;
                        container.appendChild(line);
                    });
                    container.scrollTop = container.scrollHeight;
                }, (err) => {
                    document.getElementById('chat-messages').innerHTML = `<p style="color:red;font-size:11px;text-align:center;">Erro nas Regras do Firebase. Ative o modo público no console.</p>`;
                });
            } catch(e){}
        }

        document.getElementById('btn-send-chat').addEventListener('click', async () => {
            const input = document.getElementById('chat-input-msg');
            if(!input.value.trim()) return;
            try {
                await addDoc(collection(db, "global_chat"), { sender: pou.name, text: input.value.trim(), timestamp: Date.now() });
                input.value = "";
            } catch(e) { alert("Envio bloqueado pelo Firebase."); }
        });
    </script>
</body>
</html>
