<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pou Online Multiplayer</title>
    <style>
        /* CONFIGURAÇÕES DE IMERSÃO E TEXTURAS */
        :root {
            --pou-skin: #b5835a;
            /* Cores padrão dos cômodos */
            --color-kitchen: #f39c12;
            --color-bedroom: #2c3e50;
            --color-playroom: #3498db;
            --color-bathroom: #1abc9c;
            --color-yard: #2ecc71;
        }
        
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #1a1a1a; display: flex; align-items: center; justify-content: center; font-family: 'Arial Rounded MT Bold', sans-serif; }

        /* VIEWPORT QUE SIMULA O CELULAR SÓ SE FOR NO PC */
        .game-viewport {
            width: 100vw; height: 100vh; max-width: 430px; max-height: 860px;
            position: relative; display: flex; flex-direction: column; overflow: hidden;
        }
        @media (min-width: 440px) and (min-height: 500px) {
            .game-viewport { border: 10px solid #2d3436; border-radius: 40px; height: 94vh; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        }

        .screen { display: none; width: 100%; height: 100%; position: relative; flex-direction: column; }
        .screen.active { display: flex; }

        /* ESTILOS DE PAPEL DE PAREDE DO POU (PADRÕES DINÂMICOS COM CSS) */
        .wallpaper { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; transition: background 0.4s; }
        
        /* Textura 1: Listras Clássicas do Pou */
        .tex-stripes {
            background-image: linear-gradient(90deg, rgba(255,255,255,0.15) 50%, transparent 50%);
            background-size: 40px 100%;
        }
        /* Textura 2: Quadriculado */
        .tex-chess {
            background-image: linear-gradient(45deg, rgba(255,255,255,0.1) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.1) 75%),
                              linear-gradient(45deg, rgba(255,255,255,0.1) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.1) 75%);
            background-size: 30px 30px; background-position: 0 0, 15px 15px;
        }
        /* Textura 3: Lisa/Pintura limpa */
        .tex-smooth { background-image: none; }

        /* TELA DE LOGIN */
        #auth-screen { background: #55efc4; align-items: center; justify-content: center; }
        .auth-box { background: #fff; padding: 30px 20px; border-radius: 30px; border: 5px solid #333; text-align: center; width: 85%; box-shadow: 0 10px 0 #333; }
        .auth-box h1 { font-size: 36px; margin: 0 0 15px 0; color: #333; }
        .auth-box input { padding: 15px; width: 90%; margin: 15px 0; border: 4px solid #333; border-radius: 20px; font-size: 18px; text-align: center; font-weight: bold; }
        
        .pou-btn { background: #2ecc71; color: white; padding: 15px 30px; border: 4px solid #333; border-radius: 20px; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 6px 0 #1e7e34; font-family: inherit; }
        .pou-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #1e7e34; }

        /* HUD TRANSPARENTE E IMERSIVO */
        #hud { position: absolute; top: 0; left: 0; width: 100%; padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10; background: linear-gradient(to bottom, rgba(0,0,0,0.3), transparent); }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; width: 50%; }
        .stat-bar { display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.8); border: 2.5px solid #333; padding: 2px; border-radius: 8px; font-size: 13px; font-weight: bold;}
        .progress { width: 100%; height: 10px; background: #dfe6e9; border-radius: 5px; overflow: hidden; }
        .fill { height: 100%; width: 100%; background: #2ecc71; transition: width 0.3s; }
        .user-info { display: flex; flex-direction: column; align-items: flex-end; color: white; font-weight: bold; text-shadow: 2px 2px 0 #333; line-height: 1.2; font-size: 13px;}
        .coin-tag { background: #ffeaa7; border: 2.5px solid #333; padding: 1px 8px; border-radius: 10px; margin-top: 2px; color: #333; text-shadow: none; font-size: 14px;}
        #btn-settings-toggle { background: rgba(255,255,255,0.8); border: 2.5px solid #333; font-size: 18px; width: 36px; height: 36px; border-radius: 8px; cursor: pointer; box-shadow: 0 3px 0 #333; margin-left: 6px;}

        /* CENÁRIO CENTRAL E FLUXO */
        #room-container { flex: 1; position: relative; display: flex; align-items: center; justify-content: space-between; z-index: 2; height: 100%; }
        #room-content { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        .nav-btn { background: rgba(255,255,255,0.6); border: 3px solid #333; color: #333; padding: 12px 10px; cursor: pointer; font-size: 20px; font-weight: bold; border-radius: 12px; z-index: 5; box-shadow: 0 4px 0 #333; }
        .nav-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #333; }

        /* DETALHES VISUAIS DOS 5 CÔMODOS */
        .scenery-element { position: absolute; z-index: 2; pointer-events: none; }
        
        /* Cozinha: Prateleira/Geladeira ao fundo */
        .kitchen-shelf { top: 120px; width: 75%; height: 20px; background: #d7ccc8; border: 3px solid #333; border-radius: 5px; box-shadow: 0 5px 0 rgba(0,0,0,0.2); }
        /* Banheiro: Chuveiro e saboneteira */
        .bathroom-tub { bottom: 120px; left: 20px; width: 80px; height: 45px; background: #e0f7fa; border: 3px solid #333; border-radius: 0 0 20px 20px; }
        /* Quarto: Abajur e Gaveteiro */
        .bedroom-lamp { top: 140px; right: 40px; font-size: 45px; filter: drop-shadow(0 4px 0 rgba(0,0,0,0.2)); }
        /* Sala de Jogos: Skate e Console */
        .playroom-console { bottom: 130px; right: 30px; font-size: 40px; }
        /* Quintal: Gramado, Sol e Casa do Pou */
        .yard-grass { bottom: 0; left: 0; width: 100%; height: 140px; background: #2ecc71; border-top: 5px solid #333; z-index: 2; position: absolute; }
        .yard-sun { top: 100px; left: 40px; font-size: 50px; animation: floatSun 4s ease-in-out infinite alternate; }
        .yard-house { bottom: 120px; right: 20px; font-size: 90px; filter: drop-shadow(5px 5px 0 rgba(0,0,0,0.15)); }
        
        @keyframes floatSun { from { transform: translateY(0); } to { transform: translateY(-10px); } }

        /* O POU */
        #pou-character {
            width: 165px; height: 145px; background: var(--pou-skin);
            border-radius: 50% 50% 43% 43% / 63% 63% 37% 37%;
            position: relative; box-shadow: inset 0 -15px 0 rgba(0,0,0,0.15), 0 12px 0px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 3; margin-top: 40px; transition: transform 0.1s;
        }
        .eyes { display: flex; gap: 24px; margin-top: -25px; }
        .eye { width: 44px; height: 44px; background: white; border-radius: 50%; border: 4px solid #333; position: relative; display: flex; align-items: center; justify-content: center; }
        .pupil { width: 16px; height: 16px; background: #000; border-radius: 50%; }
        .mouth { width: 36px; height: 16px; border: 4px solid #333; border-top: none; border-radius: 0 0 20px 20px; margin-top: 18px; }
        
        /* Modificadores Visuais do Pou */
        #pou-character.eating .mouth { width: 24px; height: 24px; background: #333; border-radius: 50%; }
        #pou-character.sleeping .eye { height: 5px; background: #333; border-radius: 0; border: none; width: 36px; }
        #pou-character.sleeping .pupil { display: none; }
        #pou-character.sleeping .mouth { width: 20px; height: 4px; border: none; background: #333; border-radius: 2px; }

        /* BANDEJA DE INTERAÇÕES */
        #room-actions { position: absolute; bottom: 25px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 4; }
        .emoji-box { 
            background: #fff; border: 4px solid #333; border-radius: 20px; 
            width: 75px; height: 75px; font-size: 38px; cursor: pointer; 
            box-shadow: 0 6px 0 #333; display: flex; align-items: center; justify-content: center;
        }
        .emoji-box:active { transform: translateY(4px); box-shadow: 0 2px 0 #333; }
        
        /* Balde de tinta interativo exclusivo do quintal */
        #paint-bucket { font-size: 42px; cursor: pointer; background: white; border: 4px solid #333; border-radius: 50%; width: 75px; height: 75px; display: none; align-items: center; justify-content: center; box-shadow: 0 6px 0 #333;}
        #paint-bucket:active { transform: translateY(4px); box-shadow: 0 2px 0 #333; }

        /* MENU INFERIOR */
        #game-menu { height: 75px; background: #fff; border-top: 5px solid #333; display: flex; justify-content: center; align-items: center; padding: 10px; z-index: 4; }
        .social-trigger-btn { background: var(--bg-social); color: white; border: 3px solid #333; box-shadow: 0 4px 0 #333; width: 90%; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; height: 48px; font-family: inherit;}

        /* MODAIS */
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; }
        .modal-content { background: white; margin: 20% auto; padding: 25px 20px; width: 88%; border-radius: 25px; border: 5px solid #333; position: relative; box-shadow: 0 15px 0 rgba(0,0,0,0.3); }
        .close-btn { position: absolute; right: 15px; top: 10px; font-size: 32px; cursor: pointer; font-weight: bold; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; font-weight: bold; }
        
        /* Paletas do Balde de Tinta */
        .palette-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .color-dot { width: 100%; height: 45px; border-radius: 12px; border: 3px solid #333; cursor: pointer; box-shadow: 0 3px 0 #333; }
        .color-dot:active { transform: translateY(2px); box-shadow: 0 1px 0 #333; }
        .tex-btn { background: #eee; border: 3px solid #333; border-radius: 12px; padding: 10px; font-weight: bold; cursor: pointer; font-family: inherit; box-shadow: 0 3px 0 #333;}
        .tex-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #333; }
    </style>
</head>
<body>

    <div class="game-viewport">

        <!-- 1. TELA DE LOGIN -->
        <div id="auth-screen" class="screen active">
            <div class="auth-box">
                <h1 style="margin:0; font-size:38px;">Pou Online 🥔</h1>
                <p style="font-weight:bold; color:#7f8c8d; margin:5px 0 15px 0;">O Retorno Multiplayer</p>
                <input type="text" id="pou-nickname-input" placeholder="Apelido do seu Pou" maxlength="12">
                <button id="btn-play-guest" class="pou-btn">ENTRAR NO APP</button>
            </div>
        </div>

        <!-- 2. TELA DO JOGO PRINCIPAL -->
        <div id="game-screen" class="screen">
            <!-- CANVAS DO WALLPAPER TEXTURIZADO ATRAZ DE TUDO -->
            <div id="dynamic-wallpaper" class="wallpaper tex-stripes" style="background-color: var(--color-kitchen);"></div>

            <header id="hud">
                <div class="stats-grid">
                    <div class="stat-bar">🍖<div class="progress"><div id="bar-hunger" class="fill"></div></div></div>
                    <div class="stat-bar">❤️<div class="progress"><div id="bar-health" class="fill"></div></div></div>
                    <div class="stat-bar">🕹️<div class="progress"><div id="bar-fun" class="fill"></div></div></div>
                    <div class="stat-bar">⚡<div class="progress"><div id="bar-energy" class="fill"></div></div></div>
                </div>
                <div class="user-info">
                    <span id="pou-name" style="font-size: 15px;">Pou</span>
                    <span id="pou-level" style="opacity: 0.9;">Nível 1</span>
                    <div class="coin-tag" id="pou-coins">🪙 150</div>
                </div>
                <button id="btn-settings-toggle">⚙️</button>
            </header>

            <main id="room-container">
                <button id="nav-left" class="nav-btn">◀</button>
                
                <div id="room-content">
                    <!-- ELEMENTOS CENOGRÁFICOS VOLATEIS (INJETADOS VIA JS) -->
                    <div id="scenery-canvas" style="width:100%; height:100%; position:absolute; top:0; left:0; pointer-events:none;"></div>

                    <!-- O POU REALISTA -->
                    <div id="pou-character">
                        <div class="eyes">
                            <div class="eye"><div class="pupil"></div></div>
                            <div class="eye"><div class="pupil"></div></div>
                        </div>
                        <div class="mouth"></div>
                    </div>

                    <!-- BOTÕES DE CENÁRIO -->
                    <div id="room-actions">
                        <button id="action-trigger" class="emoji-box">🍔</button>
                        <button id="paint-bucket">🎨</button>
                    </div>
                </div>

                <button id="nav-right" class="nav-btn">▶</button>
            </main>

            <footer id="game-menu">
                <button id="btn-open-social" class="social-trigger-btn">🌐 VISITAR OUTROS POUS</button>
            </footer>
        </div>

        <!-- 3. MODAL DE CONFIGURAÇÕES -->
        <div id="settings-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" id="close-settings">&times;</span>
                <h2 style="margin-top:0; text-align:center; border-bottom:4px solid #333; padding-bottom:5px;">Ajustes ⚙️</h2>
                <div class="setting-row"><span>Efeitos Sonoros</span><button id="btn-toggle-sfx" class="pou-btn" style="width:auto; padding:5px 15px; font-size:14px; box-shadow:0 3px 0 #1e7e34;">LIGADO</button></div>
                <div class="setting-row"><span>Música de Fundo</span><button id="btn-toggle-music" class="pou-btn" style="width:auto; padding:5px 15px; font-size:14px; box-shadow:0 3px 0 #1e7e34;">LIGADO</button></div>
                <div style="margin-top:20px; text-align:center;">
                    <button id="btn-save-account" class="pou-btn" style="background:#3498db; box-shadow:0 5px 0 #217dbb; font-size:15px; width:100%;">💾 Vincular Conta ao Google</button>
                </div>
            </div>
        </div>

        <!-- 4. MODAL DO BALDE DE TINTA (CUSTOMIZAÇÃO DE CENÁRIO) -->
        <div id="paint-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" id="close-paint">&times;</span>
                <h2 style="margin-top:0; text-align:center; border-bottom:4px solid #333; padding-bottom:5px;">Loja de Tintas 🎨</h2>
                
                <p style="font-weight:bold; margin-bottom:5px;">1. Escolha a Cor:</p>
                <div class="palette-grid">
                    <div class="color-dot" data-color="#f39c12" style="background:#f39c12;"></div>
                    <div class="color-dot" data-color="#2c3e50" style="background:#2c3e50;"></div>
                    <div class="color-dot" data-color="#3498db" style="background:#3498db;"></div>
                    <div class="color-dot" data-color="#1abc9c" style="background:#1abc9c;"></div>
                    <div class="color-dot" data-color="#e74c3c" style="background:#e74c3c;"></div>
                    <div class="color-dot" data-color="#9b59b6" style="background:#9b59b6;"></div>
                    <div class="color-dot" data-color="#34495e" style="background:#34495e;"></div>
                    <div class="color-dot" data-color="#ff7675" style="background:#ff7675;"></div>
                </div>

                <p style="font-weight:bold; margin:15px 0 5px 0;">2. Escolha a Estampa:</p>
                <div style="display:flex; gap:10px;">
                    <button class="tex-btn" data-tex="tex-stripes" style="flex:1;">Listras Pou</button>
                    <button class="tex-btn" data-tex="tex-chess" style="flex:1;">Xadrez</button>
                    <button class="tex-btn" data-tex="tex-smooth" style="flex:1;">Lisa</button>
                </div>
                <p style="font-size:12px; color:#7f8c8d; text-align:center; margin-top:15px; font-weight:bold;">Customização grátis aplicada ao cômodo atual!</p>
            </div>
        </div>

        <!-- 5. MODAL SOCIAL MULTIPLAYER -->
        <div id="social-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" id="close-social">&times;</span>
                <h2 style="margin-top:0; text-align:center; border-bottom:4px solid #333; padding-bottom:5px;">Vizinhos Globais 🌍</h2>
                <div id="social-body" style="max-height:280px; overflow-y:auto;"></div>
            </div>
        </div>

    </div>

    <!-- CODE LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously, GoogleAuthProvider, linkWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKtqyAvo8nNebINI6iIbFwyYyXomp-55M",
            authDomain: "lippezingame.firebaseapp.com",
            projectId: "lippezingame",
            storageBucket: "lippezingame.firebasestorage.app",
            messagingSenderId: "690275116956",
            appId: "1:690275116956:web:c26a22dac3c07f56130a59"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let pou = null;
        let userDocRef = null;
        
        // OS 5 CÔMODOS DO JOGO COMPLETO
        const rooms = ["kitchen", "bathroom", "playroom", "bedroom", "yard"];
        let roomIdx = 0;

        // Configuração padrão de wallpapers por cômodo (Salva no Firebase)
        let roomStyles = {
            kitchen: { color: "#f39c12", texture: "tex-stripes" },
            bathroom: { color: "#1abc9c", texture: "tex-stripes" },
            playroom: { color: "#3498db", texture: "tex-stripes" },
            bedroom: { color: "#2c3e50", texture: "tex-stripes" },
            yard: { color: "#74b9ff", texture: "tex-smooth" } // céu do quintal
        };

        // AUDIO ENGINE SYNTH
        let sfxEnabled = true; let musicEnabled = true; let audioCtx = null; let musicInterval = null;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playTone(freq, type, duration) {
            if (!sfxEnabled || !audioCtx) return;
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.type = type; osc.frequency.value = freq; gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
        function startMusic() {
            if (musicInterval) clearInterval(musicInterval);
            let notes = [261, 329, 392, 329, 293, 349, 440, 349]; let n = 0;
            musicInterval = setInterval(() => { if (musicEnabled && audioCtx) { playTone(notes[n], 'triangle', 0.12); n = (n + 1) % notes.length; } }, 450);
        }

        // CONEXÃO AUTH E BANCO
        document.getElementById('btn-play-guest').addEventListener('click', async () => {
            initAudio(); if(musicEnabled) startMusic();
            sessionStorage.setItem('pou_name', document.getElementById('pou-nickname-input').value.trim() || "Pou");
            await signInAnonymously(auth);
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-screen').classList.remove('active');
                document.getElementById('game-screen').classList.add('active');
                
                userDocRef = doc(db, "pous", user.uid);
                const docSnap = await getDoc(userDocRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    pou = data.pouState;
                    if(data.roomStyles) roomStyles = data.roomStyles;
                } else {
                    pou = { name: sessionStorage.getItem('pou_name'), level: 1, xp: 0, coins: 200, hunger: 100, health: 100, fun: 100, energy: 100, isSleeping: false };
                    await setDoc(userDocRef, { pouState: pou, roomStyles: roomStyles });
                }
                renderRoom();
                setInterval(runGameLoop, 10000);
            }
        });

        function runGameLoop() {
            if (!pou) return;
            if (pou.isSleeping) { pou.energy = Math.min(100, pou.energy + 8); } 
            else { pou.hunger = Math.max(0, pou.hunger - 1); pou.energy = Math.max(0, pou.energy - 0.5); pou.fun = Math.max(0, pou.fun - 1); }
            if (pou.hunger < 20) pou.health = Math.max(0, pou.health - 2);
            updateHUD();
            updateDoc(userDocRef, { pouState: pou });
        }

        function updateHUD() {
            document.getElementById('bar-hunger').style.width = `${pou.hunger}%`;
            document.getElementById('bar-health').style.width = `${pou.health}%`;
            document.getElementById('bar-fun').style.width = `${pou.fun}%`;
            document.getElementById('bar-energy').style.width = `${pou.energy}%`;
            document.getElementById('pou-name').innerText = pou.name;
            document.getElementById('pou-level').innerText = `Nível ${pou.level}`;
            document.getElementById('pou-coins').innerText = `🪙 ${pou.coins}`;
        }

        // MOTOR DE RENDERIZAÇÃO DE COMODOS IMERSIVOS
        function renderRoom() {
            if(!pou) return;
            updateHUD();
            const currentRoom = rooms[roomIdx];
            const wallpaper = document.getElementById('dynamic-wallpaper');
            const canvas = document.getElementById('scenery-canvas');
            const actionBtn = document.getElementById('action-trigger');
            const paintBucket = document.getElementById('paint-bucket');
            const pouChar = document.getElementById('pou-character');

            // Aplica Cor e Textura salvas do cômodo atual
            wallpaper.style.backgroundColor = roomStyles[currentRoom].color;
            wallpaper.className = `wallpaper ${roomStyles[currentRoom].texture}`;

            // Limpa decorações anteriores
            canvas.innerHTML = "";
            paintBucket.style.display = "none";
            actionBtn.style.display = "flex";
            
            // Reposiciona Pou se estiver no quintal (para pisar na grama)
            pouChar.style.transform = (currentRoom === "yard") ? "translateY(55px)" : "translateY(0px)";

            // GERAÇÃO DOS DETALHES VISUAIS IMERSIVOS POR CÔMODO
            if (currentRoom === "kitchen") {
                actionBtn.innerText = "🍔";
                canvas.innerHTML = `<div class="scenery-element kitchen-shelf"></div>
                                    <div style="position:absolute; top:85px; font-size:30px;">🏺</div>`;
            } 
            else if (currentRoom === "bathroom") {
                actionBtn.innerText = "🧼";
                canvas.innerHTML = `<div class="scenery-element bathroom-tub"></div>
                                    <div style="position:absolute; bottom:165px; left:45px; font-size:25px;">🚰</div>`;
            } 
            else if (currentRoom === "playroom") {
                actionBtn.innerText = "⚽";
                canvas.innerHTML = `<div class="scenery-element playroom-console">🎮</div>
                                    <div style="position:absolute; bottom:130px; left:40px; font-size:35px;">🛹</div>`;
            } 
            else if (currentRoom === "bedroom") {
                actionBtn.innerText = pou.isSleeping ? "💡" : "🌙";
                canvas.innerHTML = `<div class="scenery-element bedroom-lamp">🛋️</div>`;
                if(pou.isSleeping) wallpaper.style.backgroundColor = "#111c24";
            } 
            else if (currentRoom === "yard") {
                // No quintal exibe o Balde de Tinta e esconde o botão de ação normal
                actionBtn.style.display = "none";
                paintBucket.style.display = "flex";
                
                canvas.innerHTML = `
                    <div class="yard-sun">☀️</div>
                    <div class="yard-house">🏡</div>
                    <div class="yard-grass"></div>
                `;
            }

            pouChar.className = "";
            if (pou.isSleeping && currentRoom === "bedroom") pouChar.classList.add('sleeping');
        }

        // NAVEGAÇÃO ENTRE CÔMODOS
        document.getElementById('nav-right').addEventListener('click', () => { roomIdx = (roomIdx + 1) % rooms.length; playTone(400, 'sine', 0.05); renderRoom(); });
        document.getElementById('nav-left').addEventListener('click', () => { roomIdx = (roomIdx - 1 + rooms.length) % rooms.length; playTone(400, 'sine', 0.05); renderRoom(); });

        // SISTEMA DE INTERAÇÕES POR CÔMODO
        document.getElementById('action-trigger').addEventListener('click', () => {
            const currentRoom = rooms[roomIdx];
            const pouChar = document.getElementById('pou-character');

            if (currentRoom === "kitchen") {
                if(pou.coins >= 5) {
                    pou.hunger = Math.min(100, pou.hunger + 20); pou.coins -= 5; pou.xp += 10;
                    playTone(140, 'square', 0.08); setTimeout(() => playTone(110, 'square', 0.08), 100);
                    pouChar.classList.add('eating'); setTimeout(() => pouChar.classList.remove('eating'), 400);
                } else { alert("Sem moedas!"); }
            } 
            else if (currentRoom === "bathroom") {
                pou.health = Math.min(100, pou.health + 15);
                playTone(300, 'sine', 0.1); // Som de bolhas
                pouChar.style.transform = "scale(1.08)"; setTimeout(() => pouChar.style.transform = "scale(1)", 200);
            } 
            else if (currentRoom === "playroom") {
                pou.fun = Math.min(100, pou.fun + 25); pou.coins += 2; pou.xp += 12;
                playTone(523, 'sine', 0.05); setTimeout(() => playTone(659, 'sine', 0.05), 60);
                pouChar.style.transform = "translateY(-30px)"; setTimeout(() => pouChar.style.transform = "translateY(0)", 200);
            } 
            else if (currentRoom === "bedroom") {
                pou.isSleeping = !pou.isSleeping;
                playTone(pou.isSleeping ? 180 : 550, 'sine', 0.1);
                renderRoom();
            }

            if(pou.xp >= pou.level * 60) { pou.level++; pou.xp = 0; playTone(880, 'sine', 0.3); }
            updateHUD();
            updateDoc(userDocRef, { pouState: pou });
        });

        // MECÂNICA EXCLUSIVA DO BALDE DE TINTA (QUINTAL)
        const paintModal = document.getElementById('paint-modal');
        document.getElementById('paint-bucket').addEventListener('click', () => { playTone(400, 'sine', 0.05); paintModal.style.display = 'block'; });
        document.getElementById('close-paint').addEventListener('click', () => paintModal.style.display = 'none');

        // Mudar cor do cômodo atual
        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', (e) => {
                const currentRoom = rooms[roomIdx];
                const selectedColor = e.target.dataset.color;
                
                roomStyles[currentRoom].color = selectedColor;
                playTone(450, 'sine', 0.08);
                renderRoom();
                updateDoc(userDocRef, { roomStyles: roomStyles });
            });
        });

        // Mudar estampa do cômodo atual
        document.querySelectorAll('.tex-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const currentRoom = rooms[roomIdx];
                const selectedTex = e.target.dataset.tex;
                
                roomStyles[currentRoom].texture = selectedTex;
                playTone(480, 'sine', 0.08);
                renderRoom();
                updateDoc(userDocRef, { roomStyles: roomStyles });
            });
        });

        // CONTROLES DE AJUSTE ADICIONAIS
        const setModal = document.getElementById('settings-modal');
        document.getElementById('btn-settings-toggle').addEventListener('click', () => { initAudio(); setModal.style.display = 'block'; });
        document.getElementById('close-settings').addEventListener('click', () => setModal.style.display = 'none');
        
        document.getElementById('btn-toggle-sfx').addEventListener('click', (e) => { sfxEnabled = !sfxEnabled; e.target.innerText = sfxEnabled ? "LIGADO" : "DESLIGADO"; e.target.style.background = sfxEnabled ? "#2ecc71" : "#95a5a6"; });
        document.getElementById('btn-toggle-music').addEventListener('click', (e) => { musicEnabled = !musicEnabled; e.target.innerText = musicEnabled ? "LIGADO" : "DESLIGADO"; e.target.style.background = musicEnabled ? "#2ecc71" : "#95a5a6"; if(musicEnabled) startMusic(); });

        document.getElementById('btn-save-account').addEventListener('click', async () => {
            try { await linkWithPopup(auth.currentUser, new GoogleAuthProvider()); alert("Sincronizado permanentemente com o Google!"); } catch(e){ alert(e.message); }
        });

        // VISITAR AMIGOS
        const socModal = document.getElementById('social-modal');
        document.getElementById('btn-open-social').addEventListener('click', () => {
            socModal.style.display = 'block';
            onSnapshot(collection(db, "pous"), (snap) => {
                const body = document.getElementById('social-body'); body.innerHTML = "";
                snap.forEach(doc => {
                    if(doc.id === auth.currentUser.uid) return;
                    const data = doc.data().pouState;
                    const row = document.createElement('div'); row.className = 'player-row';
                    row.innerHTML = `<div><strong>${data.name}</strong> <span style="font-size:11px;">(Nív. ${data.level})</span><br><span style="color:#e74c3c; font-size:12px;">❤️ ${data.likes || 0} Likes</span></div>
                                     <button class="like-btn" data-id="${doc.id}" style="background:#e74c3c; color:white; border:2px solid #333; padding:5px 10px; border-radius:10px; font-weight:bold; cursor:pointer;">❤️ Curtir</button>`;
                    body.appendChild(row);
                });
                document.querySelectorAll('.like-btn').forEach(b => b.addEventListener('click', async (e) => { await updateDoc(doc(db, "pous", e.target.dataset.id), { "pouState.likes": increment(1) }); }));
            });
        });
        document.getElementById('close-social').addEventListener('click', () => socModal.style.display = 'none');
    </script>
</body>
</html>
